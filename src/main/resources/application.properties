spring.application.name=health-decoder-api

# Swagger UI: http://ipetsdk-g9fkcdb8etd9bbdg.japaneast-01.azurewebsites.net/swagger-ui/index.html
# OpenAPI JSON: http://ipetsdk-g9fkcdb8etd9bbdg.japaneast-01.azurewebsites.net/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true

server.forward-headers-strategy=framework

# .NET WebAPI 轉送目標（健康數據寫入）
net.api.health.url=https://amicoipetwebapi-e3hpa6dkb8gngah0.japaneast-01.azurewebsites.net/api/ipetdata/health-data

# .NET WebAPI 查詢動物種類（依 MAC 位址判斷 SDK animalType）
net.api.animal-type.url=https://amicoipetwebapi-e3hpa6dkb8gngah0.japaneast-01.azurewebsites.net/api/pet/animal-type

# API Key 防護：呼叫 decode-mqtt 的 MQTT station 必須在 Header 帶上此 Key
# Header 名稱：X-Api-Key
# 正式部署請改為強密碼並透過環境變數注入，不要在 source code 中明文存放
# Azure App Service 設定方式：應用程式設定 → decoder.api.key = <your-secret>
decoder.api.key=CHANGE_ME_BEFORE_DEPLOY
